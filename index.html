<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.github.com https://raw.githubusercontent.com;">
<title>ShareItNow</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f2f2f7;
  color: #1c1c1e;
  min-height: 100vh;
  font-size: 16px;
}

/* ── Auth ── */
#auth {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 1.5rem;
}
.auth-box {
  background: #fff; border-radius: 16px; padding: 2rem 1.5rem;
  width: 100%; max-width: 340px; text-align: center;
  box-shadow: 0 2px 20px rgba(0,0,0,.08);
}
.auth-box .logo { font-size: 2.5rem; margin-bottom: .5rem; }
.auth-box h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: .25rem; }
.auth-box p  { font-size: .85rem; color: #8e8e93; margin-bottom: 1.5rem; }
.auth-box input {
  width: 100%; padding: .85rem 1rem; border: 1.5px solid #e5e5ea;
  border-radius: 10px; font-size: 1rem; text-align: center;
  letter-spacing: .1em; outline: none; margin-bottom: .75rem;
  transition: border-color .15s; -webkit-appearance: none;
}
.auth-box input:focus { border-color: #007aff; }
.auth-box input.shake { animation: shake .3s ease; border-color: #ff3b30; }
.auth-box input:disabled { background: #f2f2f7; color: #8e8e93; cursor: not-allowed; }
@keyframes shake {
  0%,100%{ transform: translateX(0); }
  25%    { transform: translateX(-8px); }
  75%    { transform: translateX(8px); }
}
.auth-err { font-size: .8rem; margin-bottom: .75rem; min-height: 1.1em; line-height: 1.4; }
.auth-err.warn   { color: #ff9500; }
.auth-err.locked { color: #ff3b30; font-weight: 500; }
.auth-err.info   { color: #8e8e93; }
.attempts-bar { display: flex; gap: 5px; justify-content: center; margin-bottom: .75rem; }
.attempts-dot { width: 8px; height: 8px; border-radius: 50%; background: #e5e5ea; transition: background .2s; }
.attempts-dot.used { background: #ff3b30; }

/* ── App ── */
#app { display: none; max-width: 640px; margin: 0 auto; padding: 0 0 5rem; }

.topbar {
  background: #fff; padding: 1rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #e5e5ea; position: sticky; top: 0; z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: .6rem; }
.topbar-left .logo { font-size: 1.4rem; }
.topbar-left h1 { font-size: 1rem; font-weight: 700; }
.topbar-left .repo { font-size: .72rem; color: #8e8e93; margin-top: 1px; }
.content { padding: 1rem 1rem 0; }

/* ── Cards ── */
.card { background: #fff; border-radius: 14px; padding: 1.1rem; margin-bottom: .75rem; }
.card-label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #8e8e93; margin-bottom: .9rem; }
.list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .9rem; }

/* ── Buttons ── */
button {
  cursor: pointer; border: none; font-family: inherit; font-size: .88rem;
  font-weight: 500; border-radius: 10px; padding: .6rem 1.1rem;
  transition: opacity .15s, background .15s;
  display: inline-flex; align-items: center; gap: .35rem;
  -webkit-tap-highlight-color: transparent;
}
button:active { opacity: .7; }
.btn-blue  { background: #007aff; color: #fff; }
.btn-ghost { background: #f2f2f7; color: #3a3a3c; }
.btn-green { background: #e3f9ed; color: #34c759; }
.btn-red   { background: #fff0ee; color: #ff3b30; }
.btn-purple{ background: #f0eeff; color: #5856d6; }
.btn-full  { width: 100%; justify-content: center; }
.btn-sm    { padding: .45rem .85rem; font-size: .8rem; border-radius: 8px; }
button:disabled { opacity: .45; cursor: default; }

/* ── Drop zone ── */
#drop-zone {
  border: 2px dashed #c7c7cc; border-radius: 12px; padding: 1.8rem 1rem;
  text-align: center; cursor: pointer; position: relative;
  transition: border-color .15s, background .15s; -webkit-tap-highlight-color: transparent;
}
#drop-zone.over { border-color: #007aff; background: #f0f7ff; }
#drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
#drop-zone .dz-icon { font-size: 2rem; margin-bottom: .4rem; }
#drop-zone .dz-title { font-size: .9rem; font-weight: 600; margin-bottom: .2rem; }
#drop-zone .dz-sub { font-size: .78rem; color: #8e8e93; }

/* ── Queue ── */
#queue { margin-top: .75rem; display: none; }
.q-item { display: flex; align-items: center; gap: .6rem; padding: .6rem .75rem; background: #f8f8f8; border-radius: 9px; margin-bottom: .4rem; }
.q-icon { font-size: 1.1rem; flex-shrink: 0; }
.q-info { flex: 1; min-width: 0; }
.q-name { font-size: .83rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.q-size { font-size: .72rem; color: #8e8e93; }
.q-bar  { height: 3px; background: #e5e5ea; border-radius: 2px; margin-top: 5px; overflow: hidden; }
.q-fill { height: 100%; background: #007aff; border-radius: 2px; transition: width .2s; width: 0; }
.q-st   { font-size: .75rem; font-weight: 500; flex-shrink: 0; }
.q-st.wait { color: #8e8e93; } .q-st.go { color: #007aff; } .q-st.ok { color: #34c759; } .q-st.fail { color: #ff3b30; }
#ubtns { display: none; gap: .5rem; margin-top: .75rem; flex-wrap: wrap; }

/* ── Breadcrumb ── */
#breadcrumb { display: flex; align-items: center; gap: .2rem; flex-wrap: wrap; margin-bottom: .75rem; font-size: .82rem; }
.bc-seg { color: #007aff; cursor: pointer; font-weight: 500; }
.bc-seg:hover { text-decoration: underline; }
.bc-sep { color: #c7c7cc; margin: 0 .1rem; }
.bc-cur { color: #3a3a3c; font-weight: 600; }

/* ── File list ── */
#filelist { margin-top: .15rem; }
.f-row { display: flex; align-items: center; gap: .6rem; padding: .75rem 0; border-bottom: 1px solid #f2f2f7; }
.f-row:last-child { border-bottom: none; }
.f-icon { font-size: 1.3rem; flex-shrink: 0; }
.f-info { flex: 1; min-width: 0; cursor: pointer; }
.f-name { font-size: .88rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.f-size { font-size: .75rem; color: #8e8e93; }
.f-dir .f-name { color: #007aff; }
.f-btns { display: flex; gap: .4rem; flex-shrink: 0; }
.empty { text-align: center; padding: 2rem .5rem; color: #8e8e93; font-size: .88rem; }
.empty .ei { font-size: 2rem; margin-bottom: .5rem; }

/* ── Modal ── */
#modal-bg {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35);
  z-index: 50; align-items: center; justify-content: center; padding: 1rem;
}
#modal-bg.show { display: flex; }
.modal {
  background: #fff; border-radius: 16px; padding: 1.5rem; width: 100%;
  max-width: 320px; box-shadow: 0 8px 40px rgba(0,0,0,.18);
}
.modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: .15rem; }
.modal p  { font-size: .8rem; color: #8e8e93; margin-bottom: 1rem; }
.modal input {
  width: 100%; padding: .75rem 1rem; border: 1.5px solid #e5e5ea;
  border-radius: 10px; font-size: .95rem; outline: none; margin-bottom: .75rem;
  transition: border-color .15s;
}
.modal input:focus { border-color: #007aff; }
.modal-btns { display: flex; gap: .5rem; }
.modal-btns button { flex: 1; justify-content: center; }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: .6rem 1.2rem; border-radius: 20px; font-size: .84rem; font-weight: 500;
  color: #fff; background: #1c1c1e; white-space: nowrap; z-index: 100;
  transition: transform .25s ease; pointer-events: none;
  max-width: calc(100vw - 3rem); overflow: hidden; text-overflow: ellipsis;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.ok   { background: #34c759; }
#toast.err  { background: #ff3b30; }

.spin { animation: spin .7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 400px) { .card { border-radius: 12px; padding: .9rem; } }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <div class="logo">🔗</div>
    <h1>ShareItNow</h1>
    <p>Enter your access password</p>
    <div class="attempts-bar">
      <div class="attempts-dot" id="dot0"></div>
      <div class="attempts-dot" id="dot1"></div>
      <div class="attempts-dot" id="dot2"></div>
    </div>
    <input id="pw" type="password" placeholder="Password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="auth-err" id="pw-err"></div>
    <button class="btn-blue btn-full" id="login-btn" onclick="login()">Unlock</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">🔗</span>
      <div>
        <h1>ShareItNow</h1>
        <div class="repo" id="repo-name"></div>
      </div>
    </div>
    <button class="btn-ghost btn-sm" onclick="logout()">Sign out</button>
  </div>

  <div class="content">

    <!-- Upload card -->
    <div class="card">
      <div class="card-label">Upload Files</div>
      <div id="drop-zone">
        <input type="file" id="file-in" multiple onchange="pickFiles(this.files)">
        <div class="dz-icon">📁</div>
        <div class="dz-title">Tap to choose files</div>
        <div class="dz-sub" id="dz-dest">Uploading to root</div>
      </div>
      <div id="queue"></div>
      <div id="ubtns">
        <button class="btn-blue" id="up-btn" onclick="uploadAll()">⬆ Upload</button>
        <button class="btn-ghost" onclick="clearQ()">Clear</button>
      </div>
    </div>

    <!-- Files card -->
    <div class="card">
      <div class="list-header">
        <div class="card-label" style="margin:0">Files</div>
        <div style="display:flex;gap:.4rem">
          <button class="btn-purple btn-sm" onclick="openMkdir()">+ Folder</button>
          <button class="btn-ghost btn-sm" onclick="loadFiles()">↻</button>
        </div>
      </div>
      <div id="breadcrumb"></div>
      <div id="filelist"><div class="empty"><div class="ei"><span class="spin">↻</span></div>Loading…</div></div>
    </div>

  </div>
</div>

<!-- New Folder Modal -->
<div id="modal-bg" onclick="closeMkdir(event)">
  <div class="modal">
    <h2>📁 New Folder</h2>
    <p id="mkdir-hint">Creating inside root</p>
    <input id="folder-name" type="text" placeholder="Folder name" maxlength="100"
           autocorrect="off" autocapitalize="off" spellcheck="false"
           onkeydown="if(event.key==='Enter')doMkdir()">
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeMkdir()">Cancel</button>
      <button class="btn-blue" onclick="doMkdir()">Create</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
const MAX_ATTEMPTS = 3;
let PASS    = '';   // stored in sessionStorage after login
let pending = [];
let curPath = '';   // current sub-path (relative to GITHUB_FOLDER root)

// ─────────────────────────────────────────────────────────────────────────────
// Auth
// ─────────────────────────────────────────────────────────────────────────────
async function login() {
  const pwEl = document.getElementById('pw');
  const pw   = pwEl.value.trim();
  if (!pw) return;

  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('pw-err');
  btn.disabled    = true;
  btn.textContent = 'Checking…';

  try {
    const r = await fetch('/api/auth', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ password: pw }),
    });

    if (r.ok) {
      PASS = pw;
      pwEl.value = '';
      try { sessionStorage.setItem('sin_pw', pw); } catch {}
      resetDots();
      errEl.textContent = '';
      showApp();
    } else {
      pwEl.value = '';
      const data = await r.json().catch(() => ({}));

      if (r.status === 429) {
        // Server locked out — show message, disable until server says ok
        errEl.textContent = '⛔ ' + (data.error || 'Access denied. Try again in 5 minutes.');
        errEl.className   = 'auth-err locked';
        btn.disabled      = true;
        btn.textContent   = 'Locked out';

        // Re-enable after lockout window (read from header or default 5 min)
        const retryAfter = parseInt(r.headers.get('Retry-After') || '300', 10) * 1000;
        setTimeout(() => {
          btn.disabled    = false;
          btn.textContent = 'Unlock';
          errEl.textContent = '';
          errEl.className = 'auth-err';
          resetDots();
        }, retryAfter);

      } else {
        const remaining = parseInt(r.headers.get('X-Attempts-Remaining') || '0', 10);
        resetDots(MAX_ATTEMPTS - remaining);

        errEl.textContent = data.error || 'Incorrect password.';
        errEl.className   = remaining <= 1 ? 'auth-err warn' : 'auth-err warn';

        pwEl.classList.add('shake');
        setTimeout(() => pwEl.classList.remove('shake'), 350);
        btn.disabled    = false;
        btn.textContent = 'Unlock';
      }
    }
  } catch {
    pwEl.value      = '';
    errEl.textContent = 'Connection error — please try again';
    errEl.className = 'auth-err info';
    btn.disabled    = false;
    btn.textContent = 'Unlock';
  }
}

document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function resetDots(used = 0) {
  for (let i = 0; i < MAX_ATTEMPTS; i++)
    document.getElementById('dot' + i)?.classList.toggle('used', i < used);
}

function showApp() {
  document.getElementById('auth').style.display = 'none';
  document.getElementById('app').style.display  = 'block';
  loadMeta();
  loadFiles();
}

function logout() {
  PASS = '';
  try { sessionStorage.removeItem('sin_pw'); } catch {}
  document.getElementById('auth').style.display = 'flex';
  document.getElementById('app').style.display  = 'none';
  document.getElementById('pw').value = '';
  pending = [];
  curPath = '';
  resetDots();
}

// Restore session on page load
(function restoreSession() {
  try {
    const saved = sessionStorage.getItem('sin_pw');
    if (saved) { PASS = saved; showApp(); }
  } catch {}
})();

// ─────────────────────────────────────────────────────────────────────────────
// API helper
// ─────────────────────────────────────────────────────────────────────────────
function H(extra = {}) {
  return { 'X-Password': PASS, 'Content-Type': 'application/json', ...extra };
}

async function api(url, opts = {}) {
  const r = await fetch(url, { ...opts, headers: H(opts.headers || {}) });
  if (r.status === 401) { toast('Session ended — please log in again', 'err'); setTimeout(logout, 1500); throw new Error('auth'); }
  return r;
}

// ─────────────────────────────────────────────────────────────────────────────
// Meta
// ─────────────────────────────────────────────────────────────────────────────
async function loadMeta() {
  try {
    const r = await api('/api/meta');
    if (r.ok) document.getElementById('repo-name').textContent = (await r.json()).repo || '';
  } catch {}
}

// ─────────────────────────────────────────────────────────────────────────────
// File listing + navigation
// ─────────────────────────────────────────────────────────────────────────────
async function loadFiles(path) {
  if (path !== undefined) curPath = path;
  updateBreadcrumb();
  updateDzLabel();

  const el = document.getElementById('filelist');
  el.innerHTML = '<div class="empty"><div class="ei"><span class="spin">↻</span></div>Loading…</div>';

  try {
    const r = await api(`/api/files?path=${encodeURIComponent(curPath)}`);
    if (!r.ok) throw new Error((await r.json()).error || 'Error');
    const { dirs, files } = await r.json();
    renderItems(dirs, files);
  } catch (e) {
    if (e.message !== 'auth') el.innerHTML = `<div class="empty">⚠ ${esc(e.message)}</div>`;
  }
}

function renderItems(dirs, files) {
  const el = document.getElementById('filelist');
  if (!dirs.length && !files.length) {
    el.innerHTML = '<div class="empty"><div class="ei">📭</div>Empty folder</div>';
    return;
  }

  const dirHTML = dirs.map(d => `
    <div class="f-row f-dir">
      <span class="f-icon">📂</span>
      <div class="f-info" onclick="loadFiles(${JSON.stringify(curPath ? curPath + '/' + d.name : d.name)})">
        <div class="f-name">${esc(d.name)}</div>
        <div class="f-size">Folder</div>
      </div>
    </div>
  `).join('');

  const fileHTML = files.map(f => `
    <div class="f-row">
      <span class="f-icon">${fileIcon(f.name)}</span>
      <div class="f-info">
        <div class="f-name" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="f-size">${fmt(f.size)}</div>
      </div>
      <div class="f-btns">
        <button class="btn-green btn-sm" onclick="downloadFile(${JSON.stringify(f.name)})">↓</button>
        <button class="btn-red btn-sm" onclick="delFile(${JSON.stringify(f.name)},${JSON.stringify(f.sha)})">✕</button>
      </div>
    </div>
  `).join('');

  el.innerHTML = dirHTML + fileHTML;
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (!curPath) { bc.innerHTML = ''; return; }

  const parts = curPath.split('/');
  let html = `<span class="bc-seg" onclick="loadFiles('')">Root</span>`;
  parts.forEach((p, i) => {
    const pathTo = parts.slice(0, i + 1).join('/');
    html += `<span class="bc-sep">›</span>`;
    if (i === parts.length - 1) {
      html += `<span class="bc-cur">${esc(p)}</span>`;
    } else {
      html += `<span class="bc-seg" onclick="loadFiles(${JSON.stringify(pathTo)})">${esc(p)}</span>`;
    }
  });
  bc.innerHTML = html;
}

function updateDzLabel() {
  document.getElementById('dz-dest').textContent =
    curPath ? `Uploading into /${curPath}` : 'Uploading to root';
}

// ─────────────────────────────────────────────────────────────────────────────
// New folder
// ─────────────────────────────────────────────────────────────────────────────
function openMkdir() {
  document.getElementById('mkdir-hint').textContent =
    curPath ? `Creating inside /${curPath}` : 'Creating inside root';
  document.getElementById('folder-name').value = '';
  document.getElementById('modal-bg').classList.add('show');
  setTimeout(() => document.getElementById('folder-name').focus(), 50);
}

function closeMkdir(e) {
  if (!e || e.target === document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('show');
}

async function doMkdir() {
  const nameEl = document.getElementById('folder-name');
  const name   = nameEl.value.trim();
  if (!name) return;

  document.getElementById('modal-bg').classList.remove('show');
  toast('Creating folder…');

  try {
    const r = await api('/api/mkdir', {
      method: 'POST',
      body: JSON.stringify({ name, path: curPath }),
    });
    if (r.ok) { toast('Folder created', 'ok'); loadFiles(); }
    else { const d = await r.json(); toast('Error: ' + d.error, 'err'); }
  } catch (e) { if (e.message !== 'auth') toast('Failed to create folder', 'err'); }
}

document.getElementById('folder-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') doMkdir();
  if (e.key === 'Escape') closeMkdir();
});

// ─────────────────────────────────────────────────────────────────────────────
// Download
// ─────────────────────────────────────────────────────────────────────────────
async function downloadFile(name) {
  toast('Downloading…');
  try {
    const url = `/api/download?name=${encodeURIComponent(name)}&path=${encodeURIComponent(curPath)}`;
    const r = await fetch(url, { headers: { 'X-Password': PASS } });
    if (!r.ok) throw new Error('Not found');
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    toast('Downloaded!', 'ok');
  } catch { toast('Download failed', 'err'); }
}

// ─────────────────────────────────────────────────────────────────────────────
// Delete
// ─────────────────────────────────────────────────────────────────────────────
async function delFile(name, sha) {
  if (!confirm(`Delete "${name}"?`)) return;
  try {
    const r = await api('/api/delete', {
      method: 'DELETE',
      body: JSON.stringify({ name, sha, path: curPath }),
    });
    if (r.ok) { toast('Deleted', 'ok'); loadFiles(); }
    else toast('Delete failed', 'err');
  } catch {}
}

// ─────────────────────────────────────────────────────────────────────────────
// Upload queue
// ─────────────────────────────────────────────────────────────────────────────
function pickFiles(files) {
  for (const f of files)
    if (!pending.find(p => p.f.name === f.name && p.f.size === f.size))
      pending.push({ f, status: 'wait' });
  renderQ();
}

function renderQ() {
  const el = document.getElementById('queue');
  const ub = document.getElementById('ubtns');
  if (!pending.length) { el.style.display = 'none'; ub.style.display = 'none'; return; }
  el.style.display = 'block';
  ub.style.display = 'flex';
  el.innerHTML = pending.map((it, i) => `
    <div class="q-item">
      <span class="q-icon">${fileIcon(it.f.name)}</span>
      <div class="q-info">
        <div class="q-name">${esc(it.f.name)}</div>
        <div class="q-size">${fmt(it.f.size)}</div>
        <div class="q-bar"><div class="q-fill" id="qf${i}"></div></div>
      </div>
      <span class="q-st ${it.status}" id="qs${i}">${stl(it.status)}</span>
    </div>
  `).join('');
}

function clearQ() {
  pending = [];
  document.getElementById('file-in').value = '';
  renderQ();
}

async function uploadAll() {
  if (!pending.length) return;
  const btn = document.getElementById('up-btn');
  btn.disabled = true; btn.textContent = 'Uploading…';

  for (let i = 0; i < pending.length; i++) {
    const it = pending[i];
    if (it.status === 'ok') continue;
    setQ(i, 'go', 25);
    try {
      const b64 = await toB64(it.f);
      setQ(i, 'go', 65);
      const r = await api('/api/upload', {
        method: 'POST',
        body: JSON.stringify({ name: it.f.name, content: b64, path: curPath }),
      });
      if (!r.ok) throw new Error((await r.json()).error || 'Failed');
      setQ(i, 'ok', 100);
    } catch (e) {
      setQ(i, 'fail', 0);
      if (e.message !== 'auth') toast('Error: ' + e.message, 'err');
    }
  }

  btn.disabled = false; btn.textContent = '⬆ Upload';
  const failed = pending.filter(p => p.status === 'fail').length;
  if (!failed) { toast('All uploaded!', 'ok'); clearQ(); }
  else toast(failed + ' file(s) failed', 'err');
  loadFiles();
}

function setQ(i, st, pct) {
  pending[i].status = st;
  const s = document.getElementById('qs' + i);
  const b = document.getElementById('qf' + i);
  if (s) { s.className = 'q-st ' + st; s.textContent = stl(st); }
  if (b) b.style.width = pct + '%';
}

function toB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// Drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); pickFiles(e.dataTransfer.files); });

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────
function stl(s) { return { wait:'Ready', go:'Uploading…', ok:'✓ Done', fail:'✗ Error' }[s]; }
function fmt(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
}
function fileIcon(n) {
  const e = String(n).split('.').pop().toLowerCase();
  return ({
    pdf:'📄', doc:'📝', docx:'📝', txt:'📃', md:'📃',
    jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️', webp:'🖼️', svg:'🖼️',
    mp4:'🎬', mov:'🎬', avi:'🎬', mkv:'🎬',
    mp3:'🎵', wav:'🎵', flac:'🎵',
    zip:'📦', rar:'📦', gz:'📦', '7z':'📦',
    js:'💻', ts:'💻', py:'💻', html:'💻', css:'💻', json:'💻',
    xls:'📊', xlsx:'📊', csv:'📊', ppt:'📽️', pptx:'📽️',
    c:'💻', cpp:'💻', h:'💻', go:'💻', rs:'💻',
  })[e] || '📄';
}
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3000);
}
</script>
