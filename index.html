<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ShareNow</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f2f2f7;
  color: #1c1c1e;
  min-height: 100vh;
  font-size: 16px;
}

/* ── Auth Screen ── */
#auth {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 1.5rem;
}

.auth-box {
  background: #fff;
  border-radius: 16px;
  padding: 2rem 1.5rem;
  width: 100%;
  max-width: 340px;
  text-align: center;
  box-shadow: 0 2px 20px rgba(0,0,0,.08);
}

.auth-box .logo { font-size: 2.5rem; margin-bottom: .5rem; }
.auth-box h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: .25rem; }
.auth-box p  { font-size: .85rem; color: #8e8e93; margin-bottom: 1.5rem; }

.auth-box input {
  width: 100%;
  padding: .85rem 1rem;
  border: 1.5px solid #e5e5ea;
  border-radius: 10px;
  font-size: 1rem;
  text-align: center;
  letter-spacing: .1em;
  outline: none;
  margin-bottom: .75rem;
  transition: border-color .15s;
  -webkit-appearance: none;
}
.auth-box input:focus { border-color: #007aff; }
.auth-box input.shake { animation: shake .3s ease; border-color: #ff3b30; }
@keyframes shake {
  0%,100%{ transform: translateX(0); }
  25%    { transform: translateX(-8px); }
  75%    { transform: translateX(8px); }
}

.auth-err { color: #ff3b30; font-size: .8rem; margin-bottom: .5rem; min-height: 1.1em; }

/* ── App Screen ── */
#app { display: none; max-width: 640px; margin: 0 auto; padding: 0 0 5rem; }

.topbar {
  background: #fff;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #e5e5ea;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: .6rem; }
.topbar-left .logo { font-size: 1.4rem; }
.topbar-left h1 { font-size: 1rem; font-weight: 700; }
.topbar-left .repo { font-size: .72rem; color: #8e8e93; margin-top: 1px; }

.content { padding: 1rem 1rem 0; }

/* ── Cards ── */
.card {
  background: #fff;
  border-radius: 14px;
  padding: 1.1rem;
  margin-bottom: .75rem;
}
.card-label {
  font-size: .72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #8e8e93;
  margin-bottom: .9rem;
}

/* ── Buttons ── */
button, .btn-link {
  cursor: pointer;
  border: none;
  font-family: inherit;
  font-size: .88rem;
  font-weight: 500;
  border-radius: 10px;
  padding: .6rem 1.1rem;
  transition: opacity .15s, background .15s;
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
button:active, .btn-link:active { opacity: .7; }

.btn-blue   { background: #007aff; color: #fff; }
.btn-ghost  { background: #f2f2f7; color: #3a3a3c; }
.btn-green  { background: #e3f9ed; color: #34c759; }
.btn-red    { background: #fff0ee; color: #ff3b30; }
.btn-full   { width: 100%; justify-content: center; }
.btn-sm     { padding: .45rem .85rem; font-size: .8rem; border-radius: 8px; }

button:disabled { opacity: .45; cursor: default; }

/* ── Drop Zone ── */
#drop-zone {
  border: 2px dashed #c7c7cc;
  border-radius: 12px;
  padding: 1.8rem 1rem;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: border-color .15s, background .15s;
  -webkit-tap-highlight-color: transparent;
}
#drop-zone.over, #drop-zone:active { border-color: #007aff; background: #f0f7ff; }
#drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
#drop-zone .dz-icon { font-size: 2rem; margin-bottom: .4rem; }
#drop-zone .dz-title { font-size: .9rem; font-weight: 600; margin-bottom: .2rem; }
#drop-zone .dz-sub { font-size: .78rem; color: #8e8e93; }

/* ── Queue ── */
#queue { margin-top: .75rem; display: none; }

.q-item {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .6rem .75rem;
  background: #f8f8f8;
  border-radius: 9px;
  margin-bottom: .4rem;
}
.q-icon { font-size: 1.1rem; flex-shrink: 0; }
.q-info { flex: 1; min-width: 0; }
.q-name { font-size: .83rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.q-size { font-size: .72rem; color: #8e8e93; }
.q-bar  { height: 3px; background: #e5e5ea; border-radius: 2px; margin-top: 5px; overflow: hidden; }
.q-fill { height: 100%; background: #007aff; border-radius: 2px; transition: width .2s; width: 0; }
.q-st   { font-size: .75rem; font-weight: 500; flex-shrink: 0; }
.q-st.wait { color: #8e8e93; }
.q-st.go   { color: #007aff; }
.q-st.ok   { color: #34c759; }
.q-st.fail { color: #ff3b30; }

#ubtns { display: none; gap: .5rem; margin-top: .75rem; flex-wrap: wrap; }

/* ── File List ── */
#filelist { margin-top: .15rem; }

.f-row {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .75rem 0;
  border-bottom: 1px solid #f2f2f7;
}
.f-row:last-child { border-bottom: none; }
.f-icon { font-size: 1.3rem; flex-shrink: 0; }
.f-info { flex: 1; min-width: 0; }
.f-name { font-size: .88rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.f-size { font-size: .75rem; color: #8e8e93; }
.f-btns { display: flex; gap: .4rem; flex-shrink: 0; }

.empty { text-align: center; padding: 2rem .5rem; color: #8e8e93; font-size: .88rem; }
.empty .ei { font-size: 2rem; margin-bottom: .5rem; }

/* ── List header ── */
.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: .9rem;
}

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: .6rem 1.2rem;
  border-radius: 20px;
  font-size: .84rem;
  font-weight: 500;
  color: #fff;
  background: #1c1c1e;
  white-space: nowrap;
  z-index: 100;
  transition: transform .25s ease;
  pointer-events: none;
  max-width: calc(100vw - 3rem);
  overflow: hidden;
  text-overflow: ellipsis;
}
#toast.show       { transform: translateX(-50%) translateY(0); }
#toast.ok         { background: #34c759; }
#toast.err        { background: #ff3b30; }

.spin { animation: spin .7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 400px) {
  .card { border-radius: 12px; padding: .9rem; }
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <div class="logo">🔗</div>
    <h1>ShareNow</h1>
    <p>Enter your access password</p>
    <input id="pw" type="password" placeholder="Password" autocomplete="off">
    <div class="auth-err" id="pw-err"></div>
    <button class="btn-blue btn-full" onclick="login()">Unlock</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">🔗</span>
      <div>
        <h1>ShareNow</h1>
        <div class="repo" id="repo-name"></div>
      </div>
    </div>
    <button class="btn-ghost btn-sm" onclick="logout()">Sign out</button>
  </div>

  <div class="content">

    <!-- Upload -->
    <div class="card">
      <div class="card-label">Upload Files</div>
      <div id="drop-zone">
        <input type="file" id="file-in" multiple onchange="pickFiles(this.files)">
        <div class="dz-icon">📁</div>
        <div class="dz-title">Tap to choose files</div>
        <div class="dz-sub">Any type · Multiple files</div>
      </div>
      <div id="queue"></div>
      <div id="ubtns">
        <button class="btn-blue" id="up-btn" onclick="uploadAll()">⬆ Upload</button>
        <button class="btn-ghost" onclick="clearQ()">Clear</button>
      </div>
    </div>

    <!-- Files -->
    <div class="card">
      <div class="list-header">
        <div class="card-label" style="margin:0">Your Files</div>
        <button class="btn-ghost btn-sm" onclick="loadFiles()">↻ Refresh</button>
      </div>
      <div id="filelist"><div class="empty"><div class="ei"><span class="spin">↻</span></div>Loading…</div></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
let PW = '';
let pending = [];

// ── Auth ──────────────────────────────────────────────────
async function login() {
  const pw = document.getElementById('pw').value.trim();
  if (!pw) return;
  try {
    const r = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (r.ok) {
      PW = pw;
      sessionStorage.setItem('snpw', pw);
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadMeta();
      loadFiles();
    } else {
      throw new Error('bad');
    }
  } catch {
    const inp = document.getElementById('pw');
    document.getElementById('pw-err').textContent = 'Incorrect password';
    inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 350);
    inp.value = '';
  }
}

document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function logout() {
  PW = '';
  sessionStorage.removeItem('snpw');
  document.getElementById('auth').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pw').value = '';
  pending = [];
}

// Restore session
const saved = sessionStorage.getItem('snpw');
if (saved) { document.getElementById('pw').value = saved; login(); }

// ── API helpers ───────────────────────────────────────────
const H = (extra = {}) => ({ 'X-Password': PW, 'Content-Type': 'application/json', ...extra });

async function loadMeta() {
  const r = await fetch('/api/meta', { headers: H() }).catch(() => null);
  if (r && r.ok) {
    const d = await r.json();
    document.getElementById('repo-name').textContent = d.repo || '';
  }
}

// ── Files ─────────────────────────────────────────────────
async function loadFiles() {
  const el = document.getElementById('filelist');
  el.innerHTML = '<div class="empty"><div class="ei"><span class="spin">↻</span></div>Loading…</div>';
  try {
    const r = await fetch('/api/files', { headers: H() });
    if (!r.ok) throw new Error((await r.json()).error || 'Error');
    const files = await r.json();
    renderFiles(files);
  } catch (e) {
    el.innerHTML = `<div class="empty">⚠ ${e.message}</div>`;
  }
}

function renderFiles(files) {
  const el = document.getElementById('filelist');
  if (!files.length) {
    el.innerHTML = '<div class="empty"><div class="ei">📭</div>No files yet</div>';
    return;
  }
  el.innerHTML = files.map(f => `
    <div class="f-row">
      <span class="f-icon">${icon(f.name)}</span>
      <div class="f-info">
        <div class="f-name" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="f-size">${fmt(f.size)}</div>
      </div>
      <div class="f-btns">
        <a class="btn-green btn-sm btn-link" href="${f.download_url}" download="${esc(f.name)}" target="_blank">↓</a>
        <button class="btn-red btn-sm" onclick="delFile('${esc(f.name)}','${f.sha}')">✕</button>
      </div>
    </div>
  `).join('');
}

async function delFile(name, sha) {
  if (!confirm(`Delete "${name}"?`)) return;
  const r = await fetch('/api/delete', {
    method: 'DELETE', headers: H(),
    body: JSON.stringify({ name, sha })
  });
  if (r.ok) { toast('Deleted', 'ok'); loadFiles(); }
  else toast('Delete failed', 'err');
}

// ── Upload ────────────────────────────────────────────────
function pickFiles(files) {
  for (const f of files) {
    if (!pending.find(p => p.f.name === f.name && p.f.size === f.size))
      pending.push({ f, status: 'wait' });
  }
  renderQ();
}

function renderQ() {
  const el = document.getElementById('queue');
  const ub = document.getElementById('ubtns');
  if (!pending.length) { el.style.display = 'none'; ub.style.display = 'none'; return; }
  el.style.display = 'block';
  ub.style.display = 'flex';
  el.innerHTML = pending.map((it, i) => `
    <div class="q-item">
      <span class="q-icon">${icon(it.f.name)}</span>
      <div class="q-info">
        <div class="q-name">${esc(it.f.name)}</div>
        <div class="q-size">${fmt(it.f.size)}</div>
        <div class="q-bar"><div class="q-fill" id="qf${i}"></div></div>
      </div>
      <span class="q-st ${it.status}" id="qs${i}">${stl(it.status)}</span>
    </div>
  `).join('');
}

function clearQ() {
  pending = [];
  document.getElementById('file-in').value = '';
  renderQ();
}

async function uploadAll() {
  if (!pending.length) return;
  const btn = document.getElementById('up-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading…';

  for (let i = 0; i < pending.length; i++) {
    const it = pending[i];
    if (it.status === 'ok') continue;
    setQ(i, 'go', 25);
    try {
      const b64 = await toB64(it.f);
      setQ(i, 'go', 65);
      const r = await fetch('/api/upload', {
        method: 'POST', headers: H(),
        body: JSON.stringify({ name: it.f.name, content: b64 })
      });
      if (!r.ok) throw new Error((await r.json()).error || 'Failed');
      setQ(i, 'ok', 100);
    } catch (e) {
      setQ(i, 'fail', 0);
      toast('Error: ' + e.message, 'err');
    }
  }

  btn.disabled = false;
  btn.textContent = '⬆ Upload';
  const failed = pending.filter(p => p.status === 'fail').length;
  if (!failed) { toast('All uploaded!', 'ok'); clearQ(); }
  else toast(failed + ' failed', 'err');
  loadFiles();
}

function setQ(i, st, pct) {
  pending[i].status = st;
  const s = document.getElementById('qs' + i);
  const b = document.getElementById('qf' + i);
  if (s) { s.className = 'q-st ' + st; s.textContent = stl(st); }
  if (b) b.style.width = pct + '%';
}

function toB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ── Drag & drop ───────────────────────────────────────────
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); pickFiles(e.dataTransfer.files); });

// ── Helpers ───────────────────────────────────────────────
function stl(s) { return { wait:'Ready', go:'Uploading…', ok:'✓ Done', fail:'✗ Error' }[s]; }
function fmt(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function icon(n) {
  const e = n.split('.').pop().toLowerCase();
  const m = {
    pdf:'📄', doc:'📝', docx:'📝', txt:'📃', md:'📃',
    jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️', webp:'🖼️', svg:'🖼️',
    mp4:'🎬', mov:'🎬', avi:'🎬', mkv:'🎬',
    mp3:'🎵', wav:'🎵', flac:'🎵',
    zip:'📦', rar:'📦', gz:'📦', '7z':'📦',
    js:'💻', ts:'💻', py:'💻', html:'💻', css:'💻', json:'💻',
    xls:'📊', xlsx:'📊', csv:'📊', ppt:'📽️', pptx:'📽️',
  };
  return m[e] || '📁';
}
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3000);
}
</script>
</body>
</html>
